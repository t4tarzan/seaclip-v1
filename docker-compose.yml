services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: seaclip
      POSTGRES_PASSWORD: seaclip
      POSTGRES_DB: seaclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seaclip -d seaclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    # Port not exposed to host — use existing local Postgres for dev.
    # Uncomment below to expose on a different port if needed:
    # ports:
    #   - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    restart: unless-stopped
    ports:
      - "4200:3100"
    environment:
      DATABASE_URL: postgres://seaclip:seaclip@db:5432/seaclip
      PORT: "3100"
      HOST: "0.0.0.0"
      SERVE_UI: "true"
      NODE_ENV: production
      SEACLIP_STORAGE_DIR: /seaclip
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
      SEACLIP_DEPLOYMENT_MODE: "${SEACLIP_DEPLOYMENT_MODE:-local_trusted}"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      CORS_ORIGINS: "${CORS_ORIGINS:-localhost:3100}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3100/health').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - seaclip-data:/seaclip
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  seaclip-data:
